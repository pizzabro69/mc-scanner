<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MC Scanner{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header">
            <h2>MC Scanner</h2>
            <span class="subtitle">Server Monitor</span>
        </div>
        <ul class="nav-links">
            <li><a href="/" class="{% if active_page == 'dashboard' %}active{% endif %}">Dashboard</a></li>
            <li><a href="/servers" class="{% if active_page == 'servers' %}active{% endif %}">Servers</a></li>
            <li><a href="/leads" class="{% if active_page == 'leads' %}active{% endif %}">Leads</a></li>
        </ul>
    </nav>
    <main class="content">
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
    <script>
    (function() {
        const REFRESH_SECONDS = 30;
        let remaining = REFRESH_SECONDS;
        const badge = document.createElement('div');
        badge.style.cssText = 'position:fixed;bottom:1rem;right:1rem;background:#1a1d27;border:1px solid #2a2d3a;color:#6b7080;padding:0.3rem 0.7rem;border-radius:6px;font-size:0.75rem;z-index:999;cursor:pointer;';
        badge.title = 'Click to pause/resume auto-refresh';
        document.body.appendChild(badge);
        let paused = false;
        badge.addEventListener('click', () => {
            paused = !paused;
            badge.style.color = paused ? '#ff9800' : '#6b7080';
        });
        setInterval(() => {
            if (paused) { badge.textContent = 'refresh paused'; return; }
            remaining--;
            badge.textContent = 'refresh ' + remaining + 's';
            if (remaining <= 0) { location.reload(); }
        }, 1000);
    })();
    </script>
</body>
</html>
