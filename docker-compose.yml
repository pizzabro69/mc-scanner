version: "3.8"

services:
  mc-scanner:
    build: .
    container_name: mc-scanner
    restart: unless-stopped
    ports:
      - "9090:8000"
    volumes:
      - mc-scanner-data:/data
    environment:
      - MCS_DB_PATH=/data/mc_scanner.db
      - MCS_SCAN_INTERVAL_MINUTES=12
      - MCS_SCAN_CONCURRENCY=150
      - MCS_SCAN_TIMEOUT_SECONDS=10.0
      - MCS_WEB_PORT=8000

volumes:
  mc-scanner-data:
    driver: local
